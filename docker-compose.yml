version: '3.8'

services:
  agri-vision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agri-vision-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount for persistent uploads
      - ./static/uploads:/app/static/uploads
      # Mount for model persistence (if needed)
      - ./models:/app/models
      # Mount for results output
      - ./results:/app/results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agri-vision-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: agri-vision-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - agri-vision
    restart: unless-stopped
    networks:
      - agri-vision-network
    profiles:
      - production

networks:
  agri-vision-network:
    driver: bridge
