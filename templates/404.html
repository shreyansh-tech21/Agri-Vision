{% extends "base.html" %}
{% block content %}

<div style="text-align: center; padding: 4rem 2rem;">
    <h1 style="font-size: 6rem; margin: 0; opacity: 0.3;">404</h1>
    <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">Page Not Found</h2>
    <p style="opacity: 0.6; margin-bottom: 2rem;">Oops! This page doesn't exist or has been moved.</p>
    <a href="/" style="
        display: inline-block;
        padding: 0.75rem 2rem;
        background: var(--accent-color, #22c55e);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
    ">🌱 Back to Home</a>
</div>
{% endblock %}
